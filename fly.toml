# fly.toml app configuration file generated for wc26-predictor on 2026-06-14T17:11:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wc26-predictor'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'
  target = 'runner'

[env]
  PORT                    = '8080'
  HOSTNAME                = '0.0.0.0'
  NODE_ENV                = 'production'
  NEXT_TELEMETRY_DISABLED = '1'
  FOOTBALL_DATA_SOURCE    = 'live'

[[mounts]]
  source      = 'wc26_data'
  destination = '/app/data'

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory    = '512mb'
  cpu_kind  = 'shared'
  cpus      = 1
